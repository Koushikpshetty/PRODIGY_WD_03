<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <div class="game-mode">
            <label for="mode">Game Mode:</label>
            <select id="mode">
                <option value="pvp">Player vs Player</option>
                <option value="pvc">Player vs Computer</option>
            </select>
        </div>

        <div class="status-bar">
            <span id="status">Player X's turn</span>
            <button id="resetBtn" class="reset-btn">Reset Game</button>
        </div>

        <div class="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="score-board">
            <div class="score-item">
                <span>X Wins:</span>
                <span id="xWins">0</span>
            </div>
            <div class="score-item">
                <span>O Wins:</span>
                <span id="oWins">0</span>
            </div>
            <div class="score-item">
                <span>Draws:</span>
                <span id="draws">0</span>
            </div>
        </div>

        <button id="resetScoresBtn" class="reset-scores-btn">Reset Scores</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
